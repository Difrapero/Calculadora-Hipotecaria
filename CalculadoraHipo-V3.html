  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      text-align: center;
      padding: 20px;
      background: white;
      font-weight: bold;
      font-size: 24px;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }

    input {
      width: 100%;
      margin: 5px 0;
      padding: 8px;

    button {

      padding: 10px;
      background: black;
      color: white;

      cursor: pointer;
    }

      margin-top: 10px;

    }

      padding: 20px;
      margin: 20px;
      text-align: center;
    }

<body>

<!-- GTM (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T3X54QJQ"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

<header>Calculadora Hipotecaria</header>

<!-- TOP BANNER -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-9398420282075151"
     data-ad-slot="1234567890"
     data-ad-format="auto"></ins>

<div class="container">

  <!-- CALCULADORA CUOTA -->
  <div class="card">
    <h3>Cuota Hipotecaria</h3>

    <input id="precio" placeholder="Precio vivienda">
    <input id="interes" placeholder="Interés (%)">
    <input id="anos" placeholder="Años">

    <button onclick="calcularCuota()">Calcular</button>

    <div class="result" id="resultadoCuota"></div>
  </div>

  <!-- CALCULADORA PRECIO -->
  <div class="card">
    <h3>Precio Máximo</h3>

    <input id="ingresos" placeholder="Ingresos mensuales">
    <input id="ratio" placeholder="% destinado (ej 30)">

    <button onclick="calcularPrecio()">Calcular</button>

    <div class="result" id="resultadoPrecio"></div>
  </div>

</div>

<!-- CTA -->
<div class="cta">
  <h3>¿Quieres una hipoteca personalizada?</h3>
  <input placeholder="Tu email">
  <button>Contactar</button>
</div>

<!-- BOTTOM BANNER -->
<ins class="adsbygoogle"
     style="display:block"
     data-ad-client="ca-pub-9398420282075151"
     data-ad-slot="1234567890"
     data-ad-format="auto"></ins>

<script>
function calcularCuota() {
  let p = parseFloat(document.getElementById("precio").value);
  let i = parseFloat(document.getElementById("interes").value) / 100 / 12;
  let n = parseFloat(document.getElementById("anos").value) * 12;

  let cuota = (p * i) / (1 - Math.pow(1 + i, -n));

  document.getElementById("resultadoCuota").innerText =
    "Cuota: " + cuota.toFixed(2) + " €/mes";
}

function calcularPrecio() {
  let ingresos = parseFloat(document.getElementById("ingresos").value);
  let ratio = parseFloat(document.getElementById("ratio").value) / 100;

  let cuota = ingresos * ratio;
  let precio = cuota * 200; // simplificado

  document.getElementById("resultadoPrecio").innerText =
    "Precio estimado: " + precio.toFixed(0) + " €";
}

// activar anuncios
(adsbygoogle = window.adsbygoogle || []).push({});
</script>

</body>
